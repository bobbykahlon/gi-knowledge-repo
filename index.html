<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GI Knowledge Repository</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="app">

    <!-- Mobile header -->
    <header id="mobile-header">
      <button id="hamburger" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <span id="mobile-title">GI Knowledge Repository</span>
    </header>

    <!-- Sidebar overlay (mobile) -->
    <div id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <nav id="sidebar" aria-label="Topic navigation">
      <div id="sidebar-header">
        <div id="site-title">GI Knowledge<br>Repository</div>
      </div>
      <div id="nav-container">
        <!-- Injected by app.js -->
      </div>
    </nav>

    <!-- Main content -->
    <main id="main">
      <div id="breadcrumb" aria-label="Breadcrumb"></div>
      <article id="content-area">
        <div id="welcome">
          <h1>GI Knowledge Repository</h1>
          <p>Select a category and topic from the left sidebar to begin.</p>
        </div>
      </article>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
